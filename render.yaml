services:
  - type: web
    name: ai-hybrid-signal-engine
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DATA_SOURCE
        value: bitget
      - key: YFINANCE_FALLBACK
        value: "false"
      - key: BITGET_ENABLED
        value: "true"
